    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #0A0A0A;
            --black-card: #141414;
            --yellow: #F5C518;
            --yellow-hover: #FFD84D;
            --white: #FFFFFF;
            --gray-light: #9A9A9A;
            --gray-dark: #2A2A2A;
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== HEADER ========== */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 20px 32px;
            gap: 14px;
            animation: fadeIn 0.8s ease-out;
        }

        .logo-wrapper {
            background: var(--white);
            border-radius: 22px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(245,197,24,0.12);
        }

        .logo-wrapper img {
            width: 72px;
            height: 72px;
            object-fit: contain;
        }

        .header-socials {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .header-socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--yellow);
            color: var(--black);
            transition: all 0.3s ease;
        }

        .header-socials a:hover {
            background: var(--yellow-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(245,197,24,0.3);
        }

        .header-socials a svg { width: 18px; height: 18px; }

        .brand-name {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .tagline {
            font-size: 15px;
            font-weight: 400;
            color: var(--gray-light);
            text-align: center;
            margin-top: -6px;
        }

        /* ========== SONG GRID ========== */
        .songs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 20px 20px 48px;
            max-width: 900px;
            margin: 0 auto;
        }

        @media (min-width: 700px) {
            .songs-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                padding: 20px 32px 56px;
            }
        }

        @media (min-width: 960px) {
            .songs-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 22px;
                max-width: 1060px;
            }
        }

        @media (min-width: 1200px) {
            .songs-grid {
                grid-template-columns: repeat(5, 1fr);
                max-width: 1280px;
            }
        }

        /* ========== SONG CARD ========== */
        .song-card {
            background: var(--black-card);
            border-radius: var(--radius-lg);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeUp 0.6s ease-out both;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .song-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(245,197,24,0.08);
        }

        .song-card:nth-child(1) { animation-delay: 0.1s; }
        .song-card:nth-child(2) { animation-delay: 0.15s; }
        .song-card:nth-child(3) { animation-delay: 0.2s; }
        .song-card:nth-child(4) { animation-delay: 0.25s; }
        .song-card:nth-child(5) { animation-delay: 0.3s; }
        .song-card:nth-child(6) { animation-delay: 0.35s; }
        .song-card:nth-child(7) { animation-delay: 0.4s; }
        .song-card:nth-child(8) { animation-delay: 0.45s; }

        .song-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--white);
            text-align: center;
            line-height: 1.35;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .song-cover-link {
            display: block;
            border-radius: var(--radius-md);
            overflow: hidden;
            aspect-ratio: 1 / 1;
            background: var(--gray-dark);
            transition: opacity 0.3s ease;
        }

        .song-cover-link:hover { opacity: 0.85; }

        .song-cover-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .song-socials {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .song-socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--yellow);
            color: var(--black);
            transition: all 0.3s ease;
        }

        .song-socials a:hover {
            background: var(--yellow-hover);
            transform: scale(1.15);
        }

        .song-socials a svg { width: 13px; height: 13px; }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: 0 20px 40px;
            color: var(--gray-light);
            font-size: 13px;
        }

        .footer a {
            color: var(--yellow);
            text-decoration: none;
        }

        .footer a:hover { text-decoration: underline; }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
