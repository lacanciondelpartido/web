    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #0A0A0A;
            --black-card: #141414;
            --yellow: #F5C518;
            --yellow-hover: #FFD84D;
            --white: #FFFFFF;
            --gray-light: #9A9A9A;
            --gray-dark: #2A2A2A;
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== TOP BAR ========== */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            animation: fadeIn 0.6s ease-out;
        }

        .back-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gray-dark);
            color: var(--white);
            text-decoration: none;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .back-arrow:hover {
            background: var(--yellow);
            color: var(--black);
        }

        .back-arrow svg { width: 18px; height: 18px; }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--white);
        }

        .topbar-logo {
            background: var(--white);
            border-radius: 10px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .topbar-logo img {
            width: 26px;
            height: 26px;
            object-fit: contain;
        }

        .topbar-name {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .topbar-spacer { width: 36px; }

        /* ========== SONG CONTENT ========== */
        .song-page {
            max-width: 560px;
            margin: 0 auto;
            padding: 24px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: fadeUp 0.7s ease-out;
        }

        .song-cover {
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1 / 1;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        .song-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .song-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            line-height: 1.3;
        }

        /* ========== SONG SOCIALS ========== */
        .song-socials {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .song-socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--yellow);
            color: var(--black);
            transition: all 0.3s ease;
        }

        .song-socials a:hover {
            background: var(--yellow-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(245,197,24,0.3);
        }

        .song-socials a svg { width: 18px; height: 18px; }

        /* ========== LYRICS ========== */
        .lyrics-divider {
            width: 48px;
            height: 3px;
            background: var(--yellow);
            border-radius: 2px;
            margin: 4px 0;
        }

        .lyrics-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gray-light);
        }

        .lyrics-container {
            width: 100%;
            text-align: center;
        }

        .lyrics-container .section-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--yellow);
            margin-top: 28px;
            margin-bottom: 12px;
        }

        .lyrics-container .section-tag:first-child {
            margin-top: 0;
        }

        .lyrics-container .lyric-line {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.8;
            color: rgba(255,255,255,0.88);
        }

        .lyrics-container .section-break {
            height: 16px;
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: 0 20px 40px;
            color: var(--gray-light);
            font-size: 13px;
        }

        .footer a {
            color: var(--yellow);
            text-decoration: none;
        }

        .footer a:hover { text-decoration: underline; }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== LOADING STATE ========== */
        .lyrics-loading {
            color: var(--gray-light);
            font-size: 14px;
            text-align: center;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <nav class="topbar">

        <a href="https://compartecanciones.com" class="topbar-brand">

                <img src="logo.jpg" alt="Comparte Canciones">

    <!-- SONG CONTENT -->

        <div class="song-socials">

            </a>
        </div>

        <!-- Lyrics section -->
        <div class="lyrics-divider"></div>
        <div class="lyrics-label">Letra</div>
        <div class="lyrics-container" id="lyrics">
            <div class="lyrics-loading">Cargando letra...</div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2026 Comparte Canciones · <a href="https://compartecanciones.com">Inicio</a></p>
    </footer>

    <!-- LYRICS LOADER -->
    <script>
        (function() {
            var lyricsFile = 'lyrics/quiero-asado.txt';
            var container = document.getElementById('lyrics');

            fetch(lyricsFile)
                .then(function(r) { return r.text(); })
                .then(function(text) {
                    var html = '';
                    var lines = text.split('\n');
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();
                        if (line === '') {
                            html += '<div class="section-break"></div>';
                        } else if (line.match(/^\[.*\]$/)) {
                            html += '<div class="section-tag">' + line.replace(/[\[\]]/g, '') + '</div>';
                        } else {
                            html += '<div class="lyric-line">' + line + '</div>';
                        }
                    }
                    container.innerHTML = html;
                })
                .catch(function() {
                    container.innerHTML = '<div class="lyrics-loading">No se pudo cargar la letra.</div>';
                });
        })();
    </script>
